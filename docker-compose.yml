version: '3.8'

services:
  # Database Services
  postgres:
    image: postgres:16-alpine
    container_name: marineai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marineai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marineai_password}
      POSTGRES_DB: ${POSTGRES_DB:-marineai_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marineai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    network_mode: host

  redis:
    image: redis:7-alpine
    container_name: marineai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-marineai_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    network_mode: host

  weaviate:
    image: semitechnologies/weaviate:1.21.2
    container_name: marineai-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    network_mode: host

  minio:
    image: minio/minio:latest
    container_name: marineai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-marineai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-marineai_password}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    network_mode: host

  # Application Services
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: marineai-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:4000
      - VITE_MINIO_URL=http://localhost:9000
    depends_on:
      - backend
    network_mode: host

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: marineai-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-marineai}:${POSTGRES_PASSWORD:-marineai_password}@postgres:5432/${POSTGRES_DB:-marineai_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-marineai_redis}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_for_development}
      - JWT_EXPIRES_IN=1d
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-marineai}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-marineai_password}
      - S3_BUCKET_NAME=marineai-files
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    network_mode: host

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.dev
    container_name: marineai-ai-service
    restart: unless-stopped
    volumes:
      - ./ai-service:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - DATABASE_URL=postgresql://${POSTGRES_USER:-marineai}:${POSTGRES_PASSWORD:-marineai_password}@postgres:5432/${POSTGRES_DB:-marineai_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-marineai_redis}@redis:6379
      - WEAVIATE_URL=http://weaviate:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-marineai}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-marineai_password}
      - S3_BUCKET_NAME=marineai-files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    network_mode: host

  # Setup service - runs once to initialize buckets, etc.
  minio-setup:
    image: minio/mc:latest
    container_name: marineai-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER:-marineai} ${MINIO_ROOT_PASSWORD:-marineai_password};
      /usr/bin/mc mb --ignore-existing myminio/marineai-files;
      /usr/bin/mc policy set download myminio/marineai-files;
      exit 0;
      "
    network_mode: host

volumes:
  postgres_data:
  redis_data:
  weaviate_data:
  minio_data:
