name: MarineAI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/frontend
  BACKEND_IMAGE_NAME: ${{ github.repository }}/backend
  AI_SERVICE_IMAGE_NAME: ${{ github.repository }}/ai-service

jobs:
  # Code quality and security scanning
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, backend, ai-service]
        include:
          - service: frontend
            directory: ./frontend
            linter: npm run lint
            formatter: npm run format -- --check
          - service: backend
            directory: ./backend
            linter: npm run lint
            formatter: npm run format -- --check
          - service: ai-service
            directory: ./ai-service
            linter: flake8 .
            formatter: black --check .
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.service == 'frontend' || matrix.service == 'backend'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: ${{ matrix.service == 'frontend' && 'npm' || 'npm' }}
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Setup Python
        if: matrix.service == 'ai-service'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.directory }}/requirements.txt

      - name: Install dependencies (JS)
        if: matrix.service == 'frontend' || matrix.service == 'backend'
        working-directory: ${{ matrix.directory }}
        run: npm ci

      - name: Install dependencies (Python)
        if: matrix.service == 'ai-service'
        working-directory: ${{ matrix.directory }}
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pytest pytest-cov bandit
          pip install -r requirements.txt

      - name: Run linter
        working-directory: ${{ matrix.directory }}
        run: ${{ matrix.linter }}

      - name: Run formatter
        working-directory: ${{ matrix.directory }}
        run: ${{ matrix.formatter }}

      - name: Run security scanner (JS)
        if: matrix.service == 'frontend' || matrix.service == 'backend'
        working-directory: ${{ matrix.directory }}
        run: npx audit-ci --moderate

      - name: Run security scanner (Python)
        if: matrix.service == 'ai-service'
        working-directory: ${{ matrix.directory }}
        run: bandit -r . -x tests/

      - name: Upload code quality results
        uses: actions/upload-artifact@v3
        with:
          name: code-quality-results-${{ matrix.service }}
          path: |
            ${{ matrix.directory }}/**/lint-results.xml
            ${{ matrix.directory }}/**/format-results.xml
          retention-days: 7

  # Dependency vulnerability scanning
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: critical
          deny-licenses: GPL-3.0, AGPL-3.0
          
  # CodeQL Analysis
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript', 'python']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{ matrix.language }}"

  # Run tests with coverage reporting
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [code-quality]
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, backend, ai-service]
        include:
          - service: frontend
            directory: ./frontend
            test_command: npm run test:coverage
            coverage_path: ./frontend/coverage
          - service: backend
            directory: ./backend
            test_command: npm run test:cov
            coverage_path: ./backend/coverage
          - service: ai-service
            directory: ./ai-service
            test_command: pytest --cov=. --cov-report=xml
            coverage_path: ./ai-service/coverage.xml
            
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marineai
          POSTGRES_PASSWORD: marineai_password
          POSTGRES_DB: marineai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.service == 'frontend' || matrix.service == 'backend'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: ${{ matrix.service == 'frontend' && 'npm' || 'npm' }}
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Setup Python
        if: matrix.service == 'ai-service'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.directory }}/requirements.txt

      - name: Install dependencies (JS)
        if: matrix.service == 'frontend' || matrix.service == 'backend'
        working-directory: ${{ matrix.directory }}
        run: npm ci

      - name: Install dependencies (Python)
        if: matrix.service == 'ai-service'
        working-directory: ${{ matrix.directory }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        working-directory: ${{ matrix.directory }}
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://marineai:marineai_password@localhost:5432/marineai_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret_key
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: test_access
          S3_SECRET_KEY: test_secret
          S3_BUCKET_NAME: test-bucket
          AI_SERVICE_URL: http://localhost:8000
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test' }}
        run: ${{ matrix.test_command }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-${{ matrix.service }}
          path: ${{ matrix.coverage_path }}
          retention-days: 7
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ${{ matrix.coverage_path }}
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}-coverage
          fail_ci_if_error: false
          verbose: true

  # Build and scan Docker images
  build-docker:
    name: Build & Scan Docker - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, codeql-analysis]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, backend, ai-service]
        include:
          - service: frontend
            directory: ./frontend
            image_name: frontend
            dockerfile: ./frontend/Dockerfile
          - service: backend
            directory: ./backend
            image_name: backend
            dockerfile: ./backend/Dockerfile
          - service: ai-service
            directory: ./ai-service
            image_name: ai-service
            dockerfile: ./ai-service/Dockerfile
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=long
            
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJson(steps.meta.outputs.json).tags[0] }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: trivy-${{ matrix.service }}
          
      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging environment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.marineai.example.com
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Kubectl
        uses: azure/setup-kubectl@v3
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}
        
      - name: Deploy to Staging
        run: |
          # Set image tags in Kubernetes manifests
          cd k8s/overlays/staging
          kustomize edit set image ghcr.io/marineai/frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:sha-${{ github.sha }}
          kustomize edit set image ghcr.io/marineai/backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:sha-${{ github.sha }}
          kustomize edit set image ghcr.io/marineai/ai-service=${{ env.REGISTRY }}/${{ env.AI_SERVICE_IMAGE_NAME }}:sha-${{ github.sha }}
          
          # Apply manifests
          kustomize build . | kubectl apply -f -
          
          # Wait for rollout
          kubectl rollout status deployment/frontend -n marineai-staging
          kubectl rollout status deployment/backend -n marineai-staging
          kubectl rollout status deployment/ai-service -n marineai-staging
          
      - name: Run smoke tests
        run: |
          # Wait for services to be ready
          sleep 30
          
          # Run basic health check
          curl -f https://staging.marineai.example.com/api/health || exit 1
          
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Successfully deployed MarineAI to staging environment!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *MarineAI Staging Deployment Successful*\n\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nDeployed by: ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Staging"
                      },
                      "url": "https://staging.marineai.example.com"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # Deploy to production environment
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://app.marineai.example.com
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Kubectl
        uses: azure/setup-kubectl@v3
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}
        
      - name: Deploy to Production
        run: |
          # Set image tags in Kubernetes manifests
          cd k8s/overlays/production
          kustomize edit set image ghcr.io/marineai/frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:sha-${{ github.sha }}
          kustomize edit set image ghcr.io/marineai/backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:sha-${{ github.sha }}
          kustomize edit set image ghcr.io/marineai/ai-service=${{ env.REGISTRY }}/${{ env.AI_SERVICE_IMAGE_NAME }}:sha-${{ github.sha }}
          
          # Apply manifests
          kustomize build . | kubectl apply -f -
          
          # Wait for rollout with increased timeout for production
          kubectl rollout status deployment/frontend -n marineai-production --timeout=10m
          kubectl rollout status deployment/backend -n marineai-production --timeout=10m
          kubectl rollout status deployment/ai-service -n marineai-production --timeout=10m
          
      - name: Run production verification tests
        run: |
          # Wait for services to be ready
          sleep 60
          
          # Run comprehensive health checks
          ./scripts/production-verification.sh
          
      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          initial-status: success
          
      - name: Notify Slack on production deployment
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 MarineAI has been deployed to PRODUCTION!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *MarineAI Production Deployment Complete*\n\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nDeployed by: ${{ github.actor }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "All services are up and running. Please monitor for any issues."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Production"
                      },
                      "url": "https://app.marineai.example.com"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Metrics"
                      },
                      "url": "https://grafana.marineai.example.com"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_PROD_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # Generate deployment report
  deployment-report:
    name: Generate Deployment Report
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy-staging, deploy-production]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
          
      - name: Generate deployment report
        run: |
          echo "# MarineAI Deployment Report" > deployment-report.md
          echo "## Build Information" >> deployment-report.md
          echo "- Commit: ${{ github.sha }}" >> deployment-report.md
          echo "- Branch: ${{ github.ref_name }}" >> deployment-report.md
          echo "- Build Date: $(date)" >> deployment-report.md
          
          echo "## Test Coverage" >> deployment-report.md
          # Process coverage reports here
          
          echo "## Security Scan Results" >> deployment-report.md
          # Process security scan results here
          
          echo "## Deployment Status" >> deployment-report.md
          echo "- Staging: ${{ needs.deploy-staging.result || 'Not Run' }}" >> deployment-report.md
          echo "- Production: ${{ needs.deploy-production.result || 'Not Run' }}" >> deployment-report.md
          
      - name: Upload deployment report
        uses: actions/upload-artifact@v3
        with:
          name: deployment-report
          path: deployment-report.md
          retention-days: 30
          
      - name: Notify team of workflow completion
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "MarineAI CI/CD Pipeline Complete: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*MarineAI CI/CD Pipeline Complete*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nTrigger: ${{ github.event_name }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
